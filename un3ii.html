<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UN3II | Digital Entity</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--c1:#050505;--c2:#111;--accent:#fff;--glow:rgba(255,255,255,0.1);--glass:rgba(255,255,255,0.03);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--c1);color:#fff;font-family:'Space Grotesk',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.noise{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;opacity:0.04;pointer-events:none;background:url('https://grainy-gradients.vercel.app/noise.svg');}
.blob{position:fixed;width:500px;height:500px;background:radial-gradient(circle,rgba(255,255,255,0.05) 0%,transparent 70%);filter:blur(80px);z-index:-1;animation:move 20s infinite alternate;}
@keyframes move{from{top:-10%;left:-10%;}to{top:60%;left:70%;}}
.grid{position:fixed;inset:0;background-image:linear-gradient(var(--glow) 1px,transparent 1px),linear-gradient(90deg,var(--glow) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(circle at center,black,transparent);z-index:-1;}
nav{padding:40px 6%;display:flex;justify-content:space-between;align-items:center;z-index:100;}
.logo{font-family:'Syncopate',sans-serif;font-weight:700;font-size:1.5rem;letter-spacing:-2px;text-transform:uppercase;background:linear-gradient(90deg,#fff,var(--glow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-group{display:flex;gap:10px;background:rgba(255,255,255,0.02);padding:5px;border-radius:100px;border:1px solid rgba(255,255,255,0.05);backdrop-filter:blur(10px);}
.nav-link{text-decoration:none;color:#555;font-size:0.7rem;font-weight:700;letter-spacing:2px;padding:12px 25px;border-radius:100px;transition:0.5s cubic-bezier(0.2,1,0.3,1);text-transform:uppercase;border:none;background:none;cursor:pointer;}
.nav-link:hover{color:#fff;background:var(--glass);box-shadow:inset 0 0 20px rgba(255,255,255,0.05);}
main{flex:1;display:flex;align-items:center;justify-content:center;perspective:1000px;}
.hero-container{position:relative;animation:reveal 1.5s ease-out;}
@keyframes reveal{from{opacity:0;transform:translateY(50px) rotateX(-10deg);}to{opacity:1;transform:translateY(0) rotateX(0);}}
.hero-title{font-family:'Syncopate',sans-serif;font-size:clamp(4rem,15vw,10rem);font-weight:700;line-height:0.8;text-align:center;letter-spacing:-10px;filter:drop-shadow(0 0 50px rgba(255,255,255,0.1));}
.hero-title span{display:block;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,0.2);}
.nex-card{position:absolute;bottom:-100px;right:-50px;background:rgba(10,10,10,0.8);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(30px);padding:30px;border-radius:30px;max-width:320px;box-shadow:0 50px 100px rgba(0,0,0,0.8);transition:0.5s;}
.nex-card:hover{transform:translateY(-10px) rotate(2deg);border-color:#fff;}
.nex-card h4{font-size:0.6rem;letter-spacing:4px;color:var(--accent);margin-bottom:10px;text-transform:uppercase;}
.nex-card p{font-size:0.85rem;color:#777;line-height:1.5;margin-bottom:20px;}
.nex-btn{display:inline-flex;align-items:center;gap:10px;color:#fff;text-decoration:none;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.nex-btn::after{content:'';width:40px;height:1px;background:#fff;transition:0.3s;}
.nex-btn:hover::after{width:60px;}
#toast{position:fixed;bottom:40px;right:40px;background:#fff;color:#000;padding:20px 40px;border-radius:20px;font-weight:800;font-size:0.8rem;transform:translateX(200%);transition:0.6s cubic-bezier(0.2,1,0.3,1);z-index:10000;}
#toast.active{transform:translateX(0);}
footer{padding:40px;display:flex;justify-content:center;gap:30px;font-size:0.6rem;letter-spacing:5px;text-transform:uppercase;font-weight:700;color:#222;}
</style>
</head>
<body>
<div class="noise"></div>
<div class="blob"></div>
<div class="grid"></div>
<nav>
<div class="logo">un3ii</div>
<div class="nav-group">
<a href="un3ii-p.html" target="_blank" class="nav-link">Portfolio</a>
<button onclick="copyDC()" class="nav-link">Kontakt</button>
</div>
</nav>
<main>
<div class="hero-container">
<h1 class="hero-title">UNRII<span>DESIGN</span></h1>
<div class="nex-card">
<h4>NexCode Alliance</h4>
<p>Transforming abstract concepts into high-fidelity digital experiences.</p>
<a href="https://discord.gg/nexcode" target="_blank" class="nex-btn">Enter Discord</a>
</div>
</div>
</main>
<div id="toast">DISCORD COPIED TO CLIPBOARD</div>
<footer>
<span>Designed by Ichel1035</span>
</footer>
<script>
function copyDC(){
navigator.clipboard.writeText("un3ii_nick");
const t=document.getElementById('toast');
t.classList.add('active');
setTimeout(()=>t.classList.remove('active'),3000);
}
</script>
</body>
</html>
