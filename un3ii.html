<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UN3II | High-End Design</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--accent:#fff;--glass:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.1);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:#fff;font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;position:relative;}
.noise{position:fixed;inset:0;z-index:9999;opacity:0.03;pointer-events:none;background:url('https://grainy-gradients.vercel.app/noise.svg');}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.05) 1px,transparent 1px);background-size:50px 50px;mask-image:radial-gradient(circle at center,black,transparent);z-index:-1;}
nav{padding:30px 6%;display:flex;justify-content:space-between;align-items:center;z-index:100;width:100%;}
.logo{font-family:'Syncopate',sans-serif;font-weight:700;font-size:1.4rem;letter-spacing:-2px;text-transform:uppercase;background:linear-gradient(90deg,#fff,rgba(255,255,255,0.2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-group{display:flex;gap:10px;background:rgba(255,255,255,0.02);padding:5px;border-radius:100px;border:1px solid var(--border);backdrop-filter:blur(10px);}
.nav-link{text-decoration:none;color:#666;font-size:0.7rem;font-weight:700;letter-spacing:2px;padding:10px 20px;border-radius:100px;transition:0.4s;text-transform:uppercase;border:none;background:none;cursor:pointer;}
.nav-link:hover{color:#fff;background:var(--glass);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 6%;}
.hero-wrapper{display:flex;width:100%;max-width:1400px;align-items:center;justify-content:space-between;gap:40px;position:relative;}
.side-info{width:280px;display:flex;flex-direction:column;gap:40px;animation:fadeR 1.2s ease;}
.pro-tag{font-size:1.1rem;font-weight:700;border-left:3px solid #fff;padding-left:20px;line-height:1.2;letter-spacing:1px;}
.info-label{font-size:0.6rem;letter-spacing:4px;color:#444;text-transform:uppercase;margin-bottom:12px;display:block;}
.stack-list{display:flex;flex-wrap:wrap;gap:8px;}
.stack-item{font-size:0.7rem;background:var(--glass);padding:8px 16px;border-radius:8px;border:1px solid var(--border);color:#bbb;font-weight:700;}
.hero-title{font-family:'Syncopate',sans-serif;font-size:clamp(3rem,10vw,8rem);font-weight:700;line-height:0.85;text-align:center;letter-spacing:-8px;flex:1;}
.hero-title span{display:block;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,0.15);}
.nex-card{width:300px;background:rgba(255,255,255,0.02);border:1px solid var(--border);backdrop-filter:blur(20px);padding:30px;border-radius:32px;transition:0.5s;animation:fadeL 1.2s ease;}
.nex-card:hover{border-color:#fff;transform:translateY(-5px);}
.nex-card h4{font-size:0.65rem;letter-spacing:3px;color:#fff;margin-bottom:12px;text-transform:uppercase;}
.nex-card p{font-size:0.85rem;color:#666;line-height:1.5;margin-bottom:20px;}
.nex-btn{display:inline-flex;align-items:center;gap:10px;color:#fff;text-decoration:none;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;border:1px solid #222;padding:10px 20px;border-radius:12px;transition:0.3s;}
.nex-btn:hover{background:#fff;color:#000;}
#toast{position:fixed;bottom:30px;left:50%;transform:translate(-50%, 100px);background:#fff;color:#000;padding:15px 35px;border-radius:100px;font-weight:800;font-size:0.75rem;transition:0.6s cubic-bezier(0.2,1,0.3,1);z-index:10000;opacity:0;}
#toast.active{transform:translate(-50%, 0);opacity:1;}
footer{padding:30px;text-align:center;font-size:0.6rem;letter-spacing:5px;text-transform:uppercase;color:#222;font-weight:700;}
@keyframes fadeR{from{opacity:0;transform:translateX(-30px);}to{opacity:1;transform:translateX(0);}}
@keyframes fadeL{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}
@media (max-width:1100px){
.hero-wrapper{flex-direction:column;text-align:center;}
.side-info, .nex-card{width:100%;max-width:400px;align-items:center;}
.pro-tag{border-left:none;border-bottom:2px solid #fff;padding:0 0 10px 0;}
.hero-title{order:-1;margin-bottom:40px;}
.stack-list{justify-content:center;}
}
</style>
</head>
<body>
<div class="noise"></div>
<div class="grid"></div>
<nav>
<div class="logo">un3ii</div>
<div class="nav-group">
<a href="un3ii-p.html" target="_blank" class="nav-link">Portfolio</a>
<button onclick="copyDC()" class="nav-link">Kontakt</button>
</div>
</nav>
<main>
<div class="hero-wrapper">
<div class="side-info">
<div>
<span class="info-label">Status</span>
<div class="pro-tag">PROFESJONALNE<br>GRAFIKI</div>
</div>
<div>
<span class="info-label">Technologia</span>
<div class="stack-list">
<span class="stack-item">Photoshop</span>
</div>
</div>
</div>
<h1 class="hero-title">UNRII<span>DESIGN</span></h1>
<div class="nex-card">
<h4>NexCode Alliance</h4>
<p>Dostarczam najwyższej jakości rozwiązania wizualne dla nowoczesnych marek.</p>
<a href="https://discord.gg/nexcode" target="_blank" class="nex-btn">Discord Server</a>
</div>
</div>
</main>
<div id="toast">DISCORD SKOPIOWANY</div>
<footer>Designed by Ichel1035</footer>
<script>
function copyDC(){
navigator.clipboard.writeText("itzz_unri");
const t=document.getElementById('toast');
t.classList.add('active');
setTimeout(()=>t.classList.remove('active'),2500);
}
</script>
</body>
</html>
