<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>un3ii | Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080a;--card:rgba(20,20,25,0.7);--accent:#70a1ff;--text:#efefef;--br:24px;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;position:relative;}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:50px 50px;mask-image:radial-gradient(circle at center,black,transparent);z-index:-1;animation:gridMove 20s linear infinite;}
@keyframes gridMove{from{background-position:0 0;}to{background-position:50px 50px;}}
nav{padding:30px 8%;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(10px);z-index:10;}
.logo{font-size:1.6rem;font-weight:800;letter-spacing:-1px;background:linear-gradient(45deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-links{display:flex;gap:15px;background:rgba(255,255,255,0.05);padding:8px;border-radius:100px;border:1px solid rgba(255,255,255,0.1);}
.nav-link{text-decoration:none;color:#aaa;font-size:0.85rem;font-weight:600;padding:10px 25px;border-radius:100px;transition:0.4s;cursor:pointer;border:none;background:none;}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.1);box-shadow:0 0 20px rgba(112,161,255,0.2);}
main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;}
.main-card{background:var(--card);backdrop-filter:blur(20px);padding:60px;border-radius:var(--br);border:1px solid rgba(255,255,255,0.1);text-align:center;box-shadow:0 40px 100px rgba(0,0,0,0.5);animation:float 6s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}
.hero-text{font-size:5rem;font-weight:800;letter-spacing:-3px;margin-bottom:10px;}
.sub-text{color:#666;font-size:1rem;margin-bottom:40px;letter-spacing:1px;}
.nex-box{background:rgba(112,161,255,0.05);border-radius:20px;padding:25px;border:1px solid rgba(112,161,255,0.2);max-width:400px;transition:0.3s;}
.nex-box:hover{transform:scale(1.02);background:rgba(112,161,255,0.1);}
.nex-box h3{font-size:0.75rem;color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:10px;}
.nex-btn{display:inline-block;margin-top:20px;padding:12px 30px;background:var(--accent);color:#000;text-decoration:none;font-weight:800;border-radius:12px;transition:0.3s;}
.nex-btn:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(112,161,255,0.4);}
footer{padding:20px;text-align:center;font-size:0.7rem;color:#333;font-weight:600;letter-spacing:2px;}
#toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--accent);color:#000;padding:12px 30px;border-radius:15px;font-weight:800;transition:0.5s cubic-bezier(0.175,0.885,0.32,1.275);opacity:0;}
#toast.active{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>
<div class="grid-bg"></div>
<nav>
<div class="logo">un3ii.</div>
<div class="nav-links">
<a href="un3ii-p.html" target="_blank" class="nav-link">Portfolio</a>
<button onclick="copyDC()" class="nav-link">Kontakt</button>
</div>
</nav>
<main>
<div class="main-card">
<h1 class="hero-text">Creative Hub</h1>
<p class="sub-text">Digital Arts & High-End Design</p>
<div class="nex-box">
<h3>NEXCODE PARTNER</h3>
<p style="font-size:0.85rem;color:#999;">Explore the boundaries of digital creation with NexCode and un3ii.</p>
<a href="https://discord.gg/nexcode" target="_blank" class="nex-btn">Join Community</a>
</div>
</div>
</main>
<div id="toast">DISCORD SKOPIOWANY!</div>
<footer>Designed by Ichel1035</footer>
<script>
function copyDC(){
navigator.clipboard.writeText("un3ii_nick");
const t=document.getElementById('toast');
t.classList.add('active');
setTimeout(()=>t.classList.remove('active'),2500);
}
</script>
</body>
</html>
