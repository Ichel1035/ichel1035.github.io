<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>un3ii | Home</title>
<style>
:root{--bg:#050505;--accent:#fff;--secondary:#666;--font:'Inter',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;font-family:var(--font);}
body{background:var(--bg);color:var(--accent);height:100vh;display:flex;flex-direction:column;overflow:hidden;animation:fadeIn 1.2s ease;}
@keyframes fadeIn{from{opacity:0;filter:blur(10px);}to{opacity:1;filter:blur(0);}}
nav{padding:40px 8%;display:flex;justify-content:space-between;align-items:center;z-index:10;}
.logo{font-size:1.4rem;font-weight:900;text-transform:lowercase;letter-spacing:-1px;}
.nav-links{display:flex;gap:40px;}
.nav-link{text-decoration:none;color:var(--secondary);font-size:0.85rem;font-weight:600;transition:0.3s;cursor:pointer;border:none;background:none;text-transform:uppercase;letter-spacing:1px;}
.nav-link:hover{color:var(--accent);text-shadow:0 0 15px rgba(255,255,255,0.6);}
main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.hero-title{font-size:clamp(4rem,15vw,8rem);font-weight:900;line-height:0.9;margin-bottom:30px;background:linear-gradient(180deg,#fff 30%,#222 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nex-box{padding:25px;border:1px solid #111;border-radius:1px;background:rgba(255,255,255,0.01);backdrop-filter:blur(5px);transition:0.4s;}
.nex-box:hover{border-color:var(--accent);background:rgba(255,255,255,0.03);}
.nex-box h3{font-size:0.7rem;letter-spacing:4px;color:var(--secondary);margin-bottom:15px;}
.nex-link{display:inline-block;padding:12px 30px;border:1px solid var(--accent);color:var(--accent);text-decoration:none;font-size:0.75rem;font-weight:700;transition:0.3s;}
.nex-link:hover{background:var(--accent);color:var(--bg);}
#toast{position:fixed;top:40px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--bg);padding:10px 30px;font-size:0.8rem;font-weight:800;border-radius:2px;opacity:0;transition:0.5s cubic-bezier(0.19,1,0.22,1);pointer-events:none;}
#toast.active{opacity:1;top:60px;}
</style>
</head>
<body>
<nav>
<div class="logo">un3ii</div>
<div class="nav-links">
<a href="un3ii-p.html" target="_blank" class="nav-link">portfolio</a>
<button onclick="copyDiscord()" class="nav-link">kontakt</button>
</div>
</nav>
<main>
<h1 class="hero-title">UNRII<br>DESIGN</h1>
<div class="nex-box">
<h3>NEXCODE ECOSYSTEM</h3>
<p style="color:#444;margin-bottom:20px;font-size:0.8rem;">Innovation & Community development</p>
<a href="https://discord.gg/nexcode" target="_blank" class="nex-link">DISCORD SERVER</a>
</div>
</main>
<div id="toast">DISCORD COPIED TO CLIPBOARD</div>
<script>
function copyDiscord(){
const nick="un3ii_nick";
navigator.clipboard.writeText(nick);
const t=document.getElementById('toast');
t.classList.add('active');
setTimeout(()=>t.classList.remove('active'),2500);
}
</script>
</body>
</html>
