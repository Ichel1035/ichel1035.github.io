<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UN3II | Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--accent:#fff;--glass:rgba(255,255,255,0.02);--border:rgba(255,255,255,0.08);--br:28px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:#fff;font-family:'Space Grotesk',sans-serif;overflow-x:hidden;min-height:100vh;}
.noise{position:fixed;inset:0;z-index:9999;opacity:0.03;pointer-events:none;background:url('https://grainy-gradients.vercel.app/noise.svg');}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:80px 80px;z-index:-1;}
header{padding:80px 8% 40px;display:flex;flex-direction:column;gap:20px;}
.back-btn{text-decoration:none;color:#444;font-size:0.7rem;text-transform:uppercase;letter-spacing:3px;font-weight:700;transition:0.3s;width:fit-content;}
.back-btn:hover{color:#fff;}
h1{font-family:'Syncopate',sans-serif;font-size:clamp(2.5rem,10vw,6rem);letter-spacing:-5px;line-height:0.9;}
.filter-nav{padding:0 8% 40px;display:flex;gap:12px;flex-wrap:wrap;}
.filter-btn{padding:12px 28px;background:var(--glass);border:1px solid var(--border);color:#555;border-radius:100px;cursor:pointer;font-weight:700;font-size:0.75rem;transition:0.4s;text-transform:uppercase;letter-spacing:1px;}
.filter-btn.active, .filter-btn:hover{background:#fff;color:#000;border-color:#fff;box-shadow:0 0 20px rgba(255,255,255,0.2);}
.gallery-grid{padding:0 8% 120px;display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:40px;}
.work-card{background:var(--glass);border-radius:var(--br);overflow:hidden;border:1px solid var(--border);transition:0.7s cubic-bezier(0.19,1,0.22,1);cursor:pointer;position:relative;}
.work-card:hover{transform:translateY(-15px);border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.04);}
.img-box{width:100%;height:450px;overflow:hidden;background:#000;}
.img-box img{width:100%;height:100%;object-fit:cover;opacity:0.4;transition:0.8s;filter:grayscale(1);}
.work-card:hover .img-box img{opacity:1;filter:grayscale(0);transform:scale(1.08);}
.work-meta{padding:30px;display:flex;justify-content:space-between;align-items:flex-end;}
.work-meta h3{font-size:1.4rem;font-weight:700;letter-spacing:-1px;}
.work-meta span{color:#444;font-size:0.65rem;text-transform:uppercase;letter-spacing:3px;font-weight:800;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:10000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(25px);cursor:zoom-out;}
.modal-img{max-width:95%;max-height:85vh;border-radius:15px;box-shadow:0 0 80px rgba(0,0,0,0.8);animation:pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);}
@keyframes pop{from{transform:scale(0.9);opacity:0;}to{transform:scale(1);opacity:1;}}
footer{padding:80px;text-align:center;border-top:1px solid var(--border);color:#1a1a1a;font-size:0.65rem;letter-spacing:10px;text-transform:uppercase;font-weight:900;}
@media (max-width:768px){.gallery-grid{grid-template-columns:1fr;}h1{font-size:3.5rem;}.img-box{height:300px;}}
</style>
</head>
<body>
<div class="noise"></div>
<div class="grid"></div>
<header>
<a href="un3ii.html" class="back-btn">← Powrót do strony głównej</a>
<h1>GALERIA<br>PROJEKTÓW.</h1>
</header>
<div class="filter-nav">
<button class="filter-btn active" onclick="filter('all')">Wszystko</button>
<button class="filter-btn" onclick="filter('logo')">Logotypy</button>
<button class="filter-btn" onclick="filter('banery')">Banery</button>
</div>
<div class="gallery-grid" id="gallery">
<div class="work-card banery">
<div class="img-box"><img src="static/1.png" onclick="view(this.src)"></div>
<div class="work-meta"><div><h3>BANER</h3><span>Dla SZEFITKA</span></div></div>
</div>
</div>
<div id="modal" class="modal" onclick="this.style.display='none'">
<img id="modal-img" src="" class="modal-img">
</div>
<footer>Designed by Ichel1035</footer>
<script>
function filter(c){
const cards=document.querySelectorAll('.work-card');
const btns=document.querySelectorAll('.filter-btn');
btns.forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
cards.forEach(card=>{
if(c==='all' || card.classList.contains(c)){
card.style.display='block';
setTimeout(()=>card.style.opacity='1',10);
} else {
card.style.opacity='0';
setTimeout(()=>card.style.display='none',300);
}
});
}
function view(src){
document.getElementById('modal-img').src=src;
document.getElementById('modal').style.display='flex';
}
</script>
</body>
</html>
