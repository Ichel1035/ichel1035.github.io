<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>un3ii | Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0c;--accent:#70a1ff;--br:30px;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
body{background:var(--bg);color:#fff;padding:60px 8%;}
.grid-bg{position:fixed;inset:0;background-image:radial-gradient(circle at 2px 2px,rgba(255,255,255,0.05) 1px,transparent 0);background-size:40px 40px;z-index:-1;}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:80px;animation:fadeIn 1s ease;}
h1{font-size:3.5rem;font-weight:800;letter-spacing:-2px;}
.back{text-decoration:none;color:#555;font-weight:700;text-transform:uppercase;font-size:0.7rem;letter-spacing:2px;border:1px solid #222;padding:10px 20px;border-radius:100px;transition:0.3s;}
.back:hover{color:#fff;border-color:#fff;}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:30px;}
.item{background:#111;border-radius:var(--br);overflow:hidden;cursor:zoom-in;transition:0.5s cubic-bezier(0.2,1,0.3,1);position:relative;border:1px solid #1a1a1a;}
.item:hover{transform:scale(1.03);border-color:var(--accent);box-shadow:0 30px 60px rgba(0,0,0,0.5);}
.item img{width:100%;height:100%;object-fit:cover;transition:0.5s;}
.overlay{position:absolute;inset:0;background:linear-gradient(transparent,rgba(0,0,0,0.8));display:flex;align-items:flex-end;padding:30px;opacity:0;transition:0.3s;}
.item:hover .overlay{opacity:1;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.95);backdrop-filter:blur(15px);display:none;justify-content:center;align-items:center;z-index:100;padding:40px;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-content{background:#111;border-radius:var(--br);max-width:1100px;width:100%;display:grid;grid-template-columns:1.5fr 1fr;overflow:hidden;border:1px solid #222;}
.modal-img{width:100%;height:600px;object-fit:cover;background:#000;}
.modal-side{padding:50px;display:flex;flex-direction:column;justify-content:center;position:relative;}
.close{position:absolute;top:30px;right:30px;cursor:pointer;font-size:1.5rem;color:#555;}
.modal-side h2{font-size:2rem;margin-bottom:15px;}
.modal-side p{color:#888;line-height:1.6;margin-bottom:30px;}
.modal-btn{padding:15px;background:#fff;color:#000;text-align:center;text-decoration:none;font-weight:800;border-radius:15px;}
footer{margin-top:100px;text-align:center;padding:40px;color:#222;font-size:0.7rem;letter-spacing:3px;font-weight:800;}
@media (max-width:900px){.modal-content{grid-template-columns:1fr;}.modal-img{height:300px;}.modal-side{padding:30px;}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<header>
<h1>Visual Works.</h1>
<a href="un3ii.html" class="back">Powrót</a>
</header>
<div class="gallery">
<div class="item" onclick="openModal('https://via.placeholder.com/1200x800', 'NexCode Branding', 'Projekt identyfikacji wizualnej stworzony dla społeczności NexCode. Minimalizm i nowoczesność.')">
<img src="https://via.placeholder.com/600x600/111/fff?text=Work+1">
<div class="overlay"><span>Branding</span></div>
</div>
<div class="item" onclick="openModal('https://via.placeholder.com/1200x800', 'Cyber Abstract', 'Eksperymentalna grafika 3D wykorzystująca efekty glitch i neonowe oświetlenie.')">
<img src="https://via.placeholder.com/600x600/111/fff?text=Work+2">
<div class="overlay"><span>Digital Art</span></div>
</div>
<div class="item" onclick="openModal('https://via.placeholder.com/1200x800', 'UI Concept', 'Projekt interfejsu aplikacji mobilnej w stylu Glassmorphism.')">
<img src="https://via.placeholder.com/600x600/111/fff?text=Work+3">
<div class="overlay"><span>Interface Design</span></div>
</div>
</div>
<div id="modal" class="modal">
<div class="modal-content">
<img id="m-img" src="" class="modal-img">
<div class="modal-side">
<div class="close" onclick="closeModal()">×</div>
<h2 id="m-title">Tytuł Projektu</h2>
<p id="m-desc">Opis projektu pojawi się tutaj.</p>
<a href="#" class="modal-btn">Full Resolution</a>
</div>
</div>
</div>
<footer>Designed by Ichel1035</footer>
<script>
function openModal(img, title, desc){
document.getElementById('m-img').src=img;
document.getElementById('m-title').innerText=title;
document.getElementById('m-desc').innerText=desc;
document.getElementById('modal').style.display='flex';
}
function closeModal(){
document.getElementById('modal').style.display='none';
}
window.onclick=function(e){if(e.target==document.getElementById('modal'))closeModal();}
</script>
</body>
</html>
