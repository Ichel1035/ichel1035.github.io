<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itzz_gruszka | Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #1eff00;
            --bg-dark: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(30, 255, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1eff0015 0%, transparent 70%);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Główny kontener (Prostokąt) */
        .all {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 40px 25px;
            border-radius: 25px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 
                        0 0 20px rgba(30, 255, 0, 0.1);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Profilowe */
        .profilowe {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(45deg, var(--neon-green), transparent);
            box-shadow: 0 0 25px rgba(30, 255, 0, 0.4);
        }

        .profilowe img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--bg-dark);
        }

        /* Tekst */
        .nick h1 {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .opis {
            color: #aaaaaa;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Przyciski */
        .btn {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(30, 255, 0, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(30, 255, 0, 0.2);
            border-color: var(--neon-green);
        }

        .btn img {
            height: 30px;
            width: 30px;
            border-radius: 6px;
        }

        .btn span {
            font-weight: 600;
            font-size: 15px;
        }

        /* Footer i Branding */
        .footer-text {
            margin-top: 25px;
            font-size: 11px;
            color: #555;
            line-height: 1.6;
        }

        .powered-by {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }

        .powered-by span {
            color: var(--neon-green);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="all">
        <div class="profilowe">
            <img src="https://i.postimg.cc/2SCWKfcg/Nowy-projekt-(1).png" alt="Itzz_gruszka">
        </div>

        <div class="nick">
            <h1>Itzz_gruszka</h1>
        </div>

        <div class="opis">
            <p>Początkujący web developer</p>
        </div>

        <a href="https://youtube.com/@itzz_gruszka12?si=tR8beaDrqzhVzMhS" class="btn">
            <img src="https://i.postimg.cc/NjKdzB2x/youtube.jpg" alt="YT">
            <span>YouTube: @itzz_gruszka12</span>
        </a>

        <a href="https://www.tiktok.com/@itzz_gruszka12?_r=1&_t=ZN-951LwRFZnWR" class="btn">
            <img src="https://i.postimg.cc/fy4sJ84d/tiktok.jpg" alt="TT">
            <span>TikTok: @itzz_gruszka12</span>
        </a>

        <div class="footer-text">
            <p>© By itzz_gruszka | Chcesz takie bio? <br> Discord: <b>Itzz_gruszka</b></p>
        </div>

        <div class="powered-by">
            powered by <span>IchMgr.pl</span>
        </div>
    </div>

</body>
</html>
