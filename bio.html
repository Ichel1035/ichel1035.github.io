<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Panel | Premium Dark Mode</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* --- Zmienne i Reset --- */
        :root {
            /* Nowa, głębsza paleta */
            --bg-deep: #030304; /* Prawie czarny */
            --window-bg: rgba(13, 13, 17, 0.7); /* Półprzezroczyste tło okna */
            --card-bg: rgba(255, 255, 255, 0.03); /* Bardzo subtelne tło kart */
            --card-hover: rgba(124, 77, 255, 0.08); /* Fioletowy poblask przy hover */
            
            --accent: #8c61ff; /* Jasny, neonowy fiolet */
            --accent-glow: rgba(140, 97, 255, 0.5);
            
            --text-main: #ffffff;
            --text-muted: #888891;
            
            --border: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.08);

            --font-main: 'Poppins', sans-serif;
            --font-heading: 'Space Grotesk', sans-serif;
            
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        /* --- Styl Body i Tła --- */
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centrowanie okna pionowo */
            overflow-x: hidden;
            position: relative;
        }

        /* Animowane gradienty w tle */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--accent);
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
            animation: pulseGlow 10s infinite alternate;
        }

        body::before { top: -50px; left: -50px; }
        body::after { bottom: -50px; right: -50px; animation-delay: 5s; }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.15; }
            100% { transform: scale(1.3); opacity: 0.1; }
        }

        /* --- Główne Okno (szklany efekt) --- */
        .bio-window {
            background: var(--window-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                        inset 0 0 0 1px rgba(255,255,255,0.05);
            
            /* Animacja wejścia okna */
            animation: windowAppear 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
            
            /* Aby stopka była na dole ekranu, okno ma margin-bottom */
            margin-bottom: 100px; 
        }

        @keyframes windowAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Nagłówek Profilu --- */
        .profile-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--glass-border);
            padding: 4px;
            background: var(--bg-deep);
            transition: var(--transition);
        }

        /* Neonowy ring wokół awatara */
        .avatar-wrapper::after {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            opacity: 0.5;
            filter: blur(5px);
            transform: scale(0.9);
            transition: var(--transition);
        }

        .avatar-wrapper:hover::after {
            opacity: 1;
            transform: scale(1);
            filter: blur(8px);
        }
        
        .avatar-wrapper:hover .avatar {
            border-color: var(--accent);
            transform: scale(1.02);
        }

        h1 {
            font-family: var(--font-heading);
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            background: linear-gradient(180deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(140, 97, 255, 0.1);
            border: 1px solid rgba(140, 97, 255, 0.2);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulseDot 2s infinite;
        }

        @keyframes pulseDot {
            0% { box-shadow: 0 0 0 0 rgba(140, 97, 255, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(140, 97, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(140, 97, 255, 0); }
        }

        .bio-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            max-width: 90%;
            margin: 0 auto;
        }

        /* --- Lista Linków --- */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 22px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            
            /* Opóźnienie animacji pojawiania się dla każdego linku */
            opacity: 0;
            transform: translateY(10px);
            animation: linkAppear 0.5s ease-out forwards;
        }

        @keyframes linkAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hover efekty dla linków */
        .link-item:hover {
            background: var(--card-hover);
            border-color: rgba(140, 97, 255, 0.3);
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2), 
                        0 0 15px rgba(124, 77, 255, 0.1);
        }

        /* "Połysk" przy najechaniu */
        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .link-item:hover::before {
            left: 100%;
        }

        /* Styl Ikon (SVG Lucide) */
        .link-icon {
            width: 24px;
            height: 24px;
            color: var(--text-muted);
            transition: var(--transition);
            flex-shrink: 0;
        }

        .link-item:hover .link-icon {
            color: var(--accent);
            transform: scale(1.1);
        }

        .link-title {
            font-weight: 600;
            font-size: 1.05rem;
            flex-grow: 1;
        }

        .chevron-icon {
            width: 18px;
            height: 18px;
            color: var(--border);
            transition: var(--transition);
        }

        .link-item:hover .chevron-icon {
            color: var(--accent);
            transform: translateX(3px);
        }

        /* --- Stopka (Całkiem na dole) --- */
        .main-footer {
            width: 100%;
            position: absolute;
            bottom: 0;
            left: 0;
            padding: 25px 0;
            border-top: 1px solid var(--border);
            background: rgba(3, 3, 4, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .powered-link {
            text-decoration: none;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            transition: var(--transition);
            opacity: 0.7;
        }

        .powered-link:hover {
            opacity: 1;
            color: var(--text-main);
        }

        .ichmgr-logo {
            background: var(--accent);
            color: #fff;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 0.8rem;
            padding: 5px 10px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 0 15px var(--accent-glow);
            transition: var(--transition);
        }

        .powered-link:hover .ichmgr-logo {
            box-shadow: 0 0 25px var(--accent);
            transform: scale(1.05);
        }

        /* Responsywność dla małych ekranów */
        @media (max-width: 500px) {
            .bio-window {
                padding: 30px 20px;
                border-radius: 0; /* Full screen width on mobile */
                border-left: none;
                border-right: none;
                margin-bottom: 120px; /* Więcej miejsca na stopkę */
            }
            
            h1 { font-size: 2.1rem; }
            .bio-text { font-size: 0.9rem; max-width: 100%; }
        }

    </style>
</head>
