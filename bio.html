<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ichel1035 | Bio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg: #050505;
            --accent: #a855f7; /* Guns.lol Purple */
            --card-bg: rgba(10, 10, 10, 0.6);
            --border: rgba(168, 85, 247, 0.2);
            --text: #ffffff;
            --subtext: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair; /* Stylistyka guns.lol */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Animowane tło cząsteczek (Particles Effect) --- */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- Główne Okienko (Prostokąt) --- */
        .profile-card {
            position: relative;
            z-index: 10;
            width: 440px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(168, 85, 247, 0.1);
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- Avatar --- */
        .avatar-box {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--accent);
            padding: 4px;
            object-fit: cover;
            filter: drop-shadow(0 0 10px var(--accent));
            transition: 0.5s;
        }

        .avatar-box:hover .avatar {
            transform: rotate(360deg);
        }

        /* --- Tekst --- */
        h1 {
            font-size: 2.2rem;
            letter-spacing: -1px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }

        .typing-text {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            font-size: 0.9rem;
            margin-bottom: 30px;
            display: block;
            border-right: 2px solid var(--accent);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            white-space: nowrap;
            overflow: hidden;
            animation: typing 3s steps(30) infinite, blink 0.5s infinite;
        }

        @keyframes typing {
            0%, 100% { width: 0 }
            50%, 80% { width: 100% }
        }

        @keyframes blink {
            50% { border-color: transparent }
        }

        /* --- Przyciski / Linki --- */
        .socials {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .social-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .social-btn:hover {
            background: rgba(168, 85, 247, 0.15);
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(168, 85, 247, 0.2);
        }

        .social-btn i {
            color: var(--accent);
        }

        /* --- Stopka --- */
        .footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        .powered-by {
            text-decoration: none;
            color: var(--subtext);
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.5);
            border-radius: 50px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .powered-by:hover {
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        .logo-txt {
            font-weight: 700;
            color: var(--accent);
        }

    </style>
</head>
<body>

    <canvas id="particles-js"></canvas>

    <div class="profile-card">
        <div class="avatar-box">
            <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=ichel" alt="Avatar" class="avatar">
        </div>

        <h1>ichel1035</h1>
        <span class="typing-text">Fullstack Dev | Discord Bot Specialist</span>

        <div class="socials">
            <a href="#" class="social-btn">
                <i class="fab fa-discord"></i> Discord
            </a>
            <a href="#" class="social-btn">
                <i class="fab fa-github"></i> GitHub
            </a>
            <a href="#" class="social-btn">
                <i class="fas fa-code"></i> Projects
            </a>
            <a href="https://ichmgr.pl" class="social-btn">
                <i class="fas fa-server"></i> IchMgr
            </a>
        </div>
    </div>

    <footer class="footer">
        <a href="https://ichmgr.pl" class="powered-by">
            <span>powered by</span>
            <span class="logo-txt">IchMgr.pl</span>
        </a>
    </footer>

    <script>
        const canvas = document.getElementById('particles-js');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(168, 85, 247, 0.4)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 80; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>

</body>
</html>
