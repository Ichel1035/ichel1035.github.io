<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ichel1035 | Bio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg: #030303;
            --accent: #a855f7; 
            --glass: rgba(15, 15, 15, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Animowany Gradient w tle --- */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(168, 85, 247, 0.15) 0%, transparent 60%);
            z-index: -1;
        }

        /* --- Główne Okno (Prostokąt) --- */
        .container {
            width: 90%; /* Szerokość relatywna - nie wyjdzie poza ekran */
            max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
            margin: 20px auto; /* Centrowanie na wypadek długiego contentu */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Profil --- */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            padding: 4px;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }

        .avatar:hover {
            transform: scale(1.05) rotate(5deg);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .typing {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            font-size: 0.9rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        /* --- Linki --- */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
        }

        .item:hover {
            background: rgba(168, 85, 247, 0.1);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .item-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .item i {
            font-size: 1.2rem;
            color: var(--accent);
        }

        .fa-chevron-right {
            font-size: 0.8rem !important;
            opacity: 0.3;
        }

        /* --- Stopka na samym dole --- */
        .footer {
            margin-top: auto;
            padding: 30px 0;
            width: 100%;
            text-align: center;
        }

        .powered {
            text-decoration: none;
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .powered span {
            color: var(--accent);
            font-weight: 700;
        }

        .powered:hover {
            color: #fff;
        }

        /* Fix dla bardzo małych telefonów */
        @media (max-width: 380px) {
            .container { padding: 30px 15px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=ichel" alt="Avatar" class="avatar">
        <h1>ichel1035</h1>
        <p class="typing">Fullstack Dev | IchMgr.pl</p>

        <div class="links-grid">
            <a href="#" class="item">
                <div class="item-info">
                    <i class="fab fa-discord"></i>
                    <span>Discord</span>
                </div>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="#" class="item">
                <div class="item-info">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </div>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="https://ichmgr.pl" class="item">
                <div class="item-info">
                    <i class="fas fa-server"></i>
                    <span>IchMgr.pl</span>
                </div>
                <i class="fas fa-chevron-right"></i>
            </a>
        </div>
    </div>

    <footer class="footer">
        <a href="https://ichmgr.pl" class="powered">
            powered by <span>IchMgr.pl</span>
        </a>
    </footer>

</body>
</html>
